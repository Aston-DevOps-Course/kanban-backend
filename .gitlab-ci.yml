stages:
  - build
  - push
  - deploy

variables:
  IMAGE_NAME: imtorya/kanban-backend

build_backend:
  stage: build
  tags:
    - docker

  script:
    - docker build -t $IMAGE_NAME:latest .

push_backend:
  stage: push
  tags:
    - docker

  script:
    - docker login -u $DOCKER_USER -p $DOCKER_PASS
    - docker push $IMAGE_NAME:latest

trigger_main:
  stage: deploy
  tags: [docker]
  script:
    - curl -X POST "https://gitlab.com/api/v4/projects/82172787/trigger/pipeline" \
      -F token=$MAIN_DEPLOY_TRIGGER_TOKEN \
      -F ref=main
